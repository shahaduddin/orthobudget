  <head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ortho</title>
    <meta name="description" content="Simplicity in wealth. Smart budget management with purpose." />
    <link rel="icon" type="image/png" href="/ortho-app-icon-192.png" />
    <link rel="apple-touch-icon" href="/ortho-app-icon-192.png" />
    <meta name="google-site-verification" content="-ZL-TAgxEZdx6R5cOB-ukB-RgkSWr6vkJP7rbdOppkg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Capture the install prompt early before React loads
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
      });

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                200: '#99f6e4',
                300: '#5eead4',
                400: '#2dd4bf',
                500: '#14b8a6',
                600: '#0d9488',
                700: '#0f766e',
                800: '#115e59',
                900: '#134e4a',
                950: '#042f2e',
              },
              expense: '#ef4444',
              income: '#10b981',
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            animation: {
              'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
              'fade-in': 'fadeIn 0.2s ease-in-out',
              'scale-in': 'scaleIn 0.15s cubic-bezier(0.16, 1, 0.3, 1)',
              'bounce-small': 'bounceSmall 0.3s infinite alternate',
              'spin-reverse': 'spinReverse 1.5s linear infinite',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              bounceSmall: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-5px)' },
              },
              spinReverse: {
                'from': { transform: 'rotate(360deg)' },
                'to': { transform: 'rotate(0deg)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      html, body, #root {
        height: 100%;
        width: 100%;
        overflow: hidden; /* Lock the body scroll */
        overscroll-behavior: none; /* Prevent browser bounce */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none; /* Disable long-press menu */
        -webkit-user-select: none; /* Disable text selection */
        user-select: none;
        touch-action: manipulation;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      }
      
      /* Allow interaction with inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Disable image dragging */
      img {
        -webkit-user-drag: none;
        user-drag: none;
        pointer-events: none;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Safe area padding for notched devices */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      
      /* Recharts focus fix */
      .recharts-wrapper {
        outline: none !important;
      }

      /* Native-like input fix */
      input[type="date"], input[type="time"] {
        -webkit-appearance: none;
        min-height: 2.5rem;
      }
      
      /* Median.co Specific Hide Class */
      body.gonative .hide-on-native {
        display: none !important;
      }
    </style>

</head>
  <body class="bg-zinc-50 dark:bg-black text-zinc-900 dark:text-zinc-100 antialiased select-none transition-colors duration-300">
    <div id="root" class="w-full h-full"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed', err));
        });
      }
      
      // Theme Check
      const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }

      // Median.co (GoNative) Bridge Logic
      function median_library_ready() {
         // Sync Status Bar Color with Theme
         const updateStatusBar = () => {
            const isDarkMode = document.documentElement.classList.contains('dark');
            const color = isDarkMode ? '000000' : 'ffffff';
            const style = isDarkMode ? 'light' : 'dark'; // Text color
            
            // Set Status Bar
            if(window.median) {
                median.statusbar.set({
                    style: style,
                    color: color,
                    overlay: false
                });
            }
         };

         // Initial Set
         updateStatusBar();

         // Observe class changes on HTML element to switch status bar dynamically
         const observer = new MutationObserver(updateStatusBar);
         observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
      }
    </script>
  </body>
</html>
